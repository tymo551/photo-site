<!-- =========================
       PHOTO FEED
========================== -->
<main class="photo-feed">

  <!-- ROW 1 : WIDE SHUFFLE -->
  <section class="row single-layout">
    <div class="wide shuffle"
         data-images="images/image1.jpg,images/image2.jpg,images/w3.jpg">

      <img class="active" src="images/image1.jpg" alt="">
      <img src="images/image2.jpg" alt="">

    </div>
  </section>


  <!-- ROW 2 : GRID WITH VERTICAL SHUFFLE -->
  <section class="row three-layout">

    <div class="square">
      <img src="images/s1.jpg" alt="">
    </div>

    <div class="square">
      <img src="images/s2.jpg" alt="">
    </div>

    <div class="portrait shuffle"
         data-images="images/p1.jpg,images/p2.jpg,images/p3.jpg">

      <img class="active" src="images/p1.jpg" alt="">
      <img src="images/p2.jpg" alt="">

    </div>

  </section>

<script>

const menuToggle = document.getElementById("menuToggle");
const dropdownMenu = document.getElementById("dropdownMenu");

menuToggle.addEventListener("click", () => {
  menuToggle.classList.toggle("open");
  dropdownMenu.classList.toggle("open");
});
/* =========================
   STABLE SHUFFLE (CLEAN VERSION)
========================= */

const shufflePanels = document.querySelectorAll('.shuffle');

shufflePanels.forEach((panel, panelIndex) => {

  let images = panel.dataset.images.split(',');

  // Shuffle once on load
  images = images.sort(() => Math.random() - 0.5);

  const imgs = panel.querySelectorAll('img');

  let currentIndex = 0;
  let visibleIndex = 0;

  const baseDelay = 4800;        // slightly shorter than 6000
  const stagger = panelIndex * 800;

  setTimeout(() => {

    setInterval(() => {

      const nextIndex = (currentIndex + 1) % images.length;
      const nextSrc = images[nextIndex];

      const hiddenImg = imgs[visibleIndex === 0 ? 1 : 0];

      // Preload next image quietly
      const preload = new Image();
      preload.src = nextSrc;

      hiddenImg.src = nextSrc;

      hiddenImg.classList.add('active');
      imgs[visibleIndex].classList.remove('active');

      visibleIndex = visibleIndex === 0 ? 1 : 0;
      currentIndex = nextIndex;

    }, baseDelay);

  }, stagger);

});


/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu", function (e) {
  e.preventDefault();
});

</script>
